<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha carta ❤️</title>

    <style>

        body{

            margin:0;
            background:#0f071d;
            color:white;
            font-family:Arial, Helvetica, sans-serif;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;

        }

        .caixa{

            width:800px;
            max-width:90%;

            background:rgba(255,255,255,.05);

            border:1px solid rgba(255,255,255,.15);

            border-radius:25px;

            padding:45px;

            text-align:center;

        }

        h1{

            font-size:45px;

            margin-bottom:30px;

        }

        #texto{

            font-size:22px;

            line-height:1.8;

            text-align:left;

            white-space:pre-line;

        }

    </style>

</head>

<body>

<div class="caixa">

<h1>💌 Uma carta para você 💌</h1>

<p id="texto"></p>

</div>

</body>

</html>
