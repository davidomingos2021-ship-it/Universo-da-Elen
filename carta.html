<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Uma carta para Elen ❤️</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;

            font-family: Arial, Helvetica, sans-serif;
            color: white;

            background:
                radial-gradient(
                    circle at 50% 20%,
                    #371252 0%,
                    #170822 40%,
                    #07020e 75%,
                    #000000 100%
                );

            overflow-x: hidden;
        }

        /* Fundo estrelado */

        #estrelas {
            position: fixed;
            inset: 0;

            overflow: hidden;
            pointer-events: none;

            z-index: 0;
        }

        .estrela {
            position: absolute;

            width: 3px;
            height: 3px;

            border-radius: 50%;
            background: white;

            box-shadow:
                0 0 6px white,
                0 0 12px rgba(255, 255, 255, 0.75);

            animation: piscar 2.5s infinite alternate;
        }

        @keyframes piscar {
            from {
                opacity: 0.15;
                transform: scale(0.7);
            }

            to {
                opacity: 1;
                transform: scale(1.35);
            }
        }

        /* Estrelas cadentes */

        .cadente {
            position: fixed;

            top: -100px;
            left: -250px;

            width: 220px;
            height: 2px;

            background:
                linear-gradient(
                    to right,
                    transparent,
                    white
                );

            opacity: 0;
            pointer-events: none;

            transform: rotate(35deg);

            animation: cair 9s linear infinite;

            z-index: 1;
        }

        .cadente-2 {
            animation-delay: 3s;
        }

        .cadente-3 {
            animation-delay: 6s;
        }

        @keyframes cair {
            0% {
                opacity: 0;

                transform:
                    translate(-200px, -150px)
                    rotate(35deg);
            }

            8% {
                opacity: 1;
            }

            28% {
                opacity: 0;

                transform:
                    translate(135vw, 100vh)
                    rotate(35deg);
            }

            100% {
                opacity: 0;
            }
        }

        /* Lua */

        .lua {
            position: fixed;

            top: 5%;
            right: 6%;

            width: 90px;
            height: 90px;

            border-radius: 50%;

            background:
                radial-gradient(
                    circle at 35% 30%,
                    #ffffff,
                    #fff2c4 55%,
                    #d6bf7b 100%
                );

            box-shadow:
                0 0 25px rgba(255, 244, 194, 0.7),
                0 0 70px rgba(255, 244, 194, 0.3);

            opacity: 0.8;

            animation: flutuar 5s ease-in-out infinite;

            z-index: 1;
        }

        @keyframes flutuar {
            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        /* Corações flutuando */

        .coracao {
            position: fixed;

            bottom: -50px;

            color: rgba(255, 135, 190, 0.7);

            opacity: 0;

            pointer-events: none;

            animation: subir 11s linear infinite;

            z-index: 1;
        }

        @keyframes subir {
            0% {
                opacity: 0;

                transform:
                    translateY(0)
                    rotate(0deg);
            }

            15% {
                opacity: 0.75;
            }

            80% {
                opacity: 0.45;
            }

            100% {
                opacity: 0;

                transform:
                    translateY(-120vh)
                    rotate(30deg);
            }
        }

        /* Área principal */

        main {
            position: relative;
            z-index: 5;

            width: 100%;

            padding:
                70px
                20px
                100px;
        }

        .caixa {
            width: min(92%, 900px);

            margin: 0 auto;

            padding: 48px 42px;

            border:
                1px solid
                rgba(255, 255, 255, 0.14);

            border-radius: 28px;

            background:
                rgba(18, 6, 31, 0.68);

            backdrop-filter: blur(12px);

            box-shadow:
                0 25px 80px rgba(0, 0, 0, 0.55),
                0 0 50px rgba(207, 103, 255, 0.12);
        }

        .pequeno {
            text-align: center;

            margin-bottom: 12px;

            color: #dbc7ff;

            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        h1 {
            margin:
                0
                0
                35px;

            text-align: center;

            font-size:
                clamp(
                    32px,
                    6vw,
                    50px
                );

            text-shadow:
                0 0 20px
                rgba(255, 255, 255, 0.2);
        }

        #texto {
            min-height: 200px;

            font-size:
                clamp(
                    18px,
                    3vw,
                    23px
                );

            line-height: 1.9;

            white-space: pre-line;

            color: #f4eef9;
        }

        .cursor {
            display: inline-block;

            width: 3px;
            height: 1em;

            margin-left: 4px;

            background: #ffffff;

            vertical-align: middle;

            animation: piscarCursor 0.8s infinite;
        }

        @keyframes piscarCursor {
            0%,
            45% {
                opacity: 1;
            }

            46%,
            100% {
                opacity: 0;
            }
        }

        #final {
            display: none;

            margin-top: 45px;

            text-align: center;

            animation: aparecer 1.5s ease forwards;
        }

        #final h2 {
            margin-bottom: 12px;

            font-size:
                clamp(
                    28px,
                    5vw,
                    42px
                );
        }

        #final p {
            font-size: 18px;
            color: #d8cce3;
        }

        button {
            margin-top: 28px;

            padding: 17px 34px;

            border: none;
            border-radius: 999px;

            font-size: 18px;
            font-weight: bold;

            color: #25072f;

            background:
                linear-gradient(
                    135deg,
                    #ffffff,
                    #e6c9ff
                );

            cursor: pointer;

            box-shadow:
                0 12px 35px
                rgba(224, 150, 255, 0.3);

            transition:
                transform 0.25s ease,
                box-shadow 0.25s ease;
        }

        button:hover {
            transform: scale(1.06);

            box-shadow:
                0 16px 45px
                rgba(224, 150, 255, 0.5);
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            main {
                padding:
                    90px
                    12px
                    70px;
            }

            .caixa {
                width: 100%;

                padding:
                    32px
                    20px;

                border-radius: 22px;
            }

            .lua {
                width: 65px;
                height: 65px;

                top: 3%;
                right: 5%;
            }

            #texto {
                line-height: 1.75;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div id="estrelas"></div>

    <div class="cadente"></div>
    <div class="cadente cadente-2"></div>
    <div class="cadente cadente-3"></div>

    <div class="lua"></div>

    <main>
        <div class="caixa">

            <div class="pequeno">
                Escrito com todo o meu amor
            </div>

            <h1>
                💌 Para o amor da minha vida 💌
            </h1>

            <div id="texto"></div>

            <span
                id="cursor"
                class="cursor"
            ></span>

            <div id="final">

                <h2>
                    Eu te amo infinitamente ❤️
                </h2>

                <p>
                    E essa ainda é apenas a primeira parte
                    da nossa história.
                </p>

                <button onclick="proximaParte()">
                    Ver a próxima surpresa ✨
                </button>

            </div>

        </div>
    </main>

    <script>
        const carta = `
Cara, eu te amo tanto, mas tanto, que não consigo descrever esse amor que sinto por você. Mas pode ter certeza de uma coisa: eu jamais vou te deixar sozinha.

Eu sinto que encontro toda a minha paz em você. Você consegue me fazer rir em qualquer momento, independentemente da situação. Quando estou triste, cansado ou até mesmo pensando demais, é você quem consegue deixar tudo melhor.

Eu sei que ainda estamos no começo da nossa história, mas quero ir até onde Deus permitir. Eu amo cada detalhe seu. Você me completa por inteiro. Jamais imaginei que seria você. Jamais imaginei que você iria me amar, principalmente por causa da minha aparência ou qualquer outra coisa. Mas você está me mostrando um lado seu que faz eu me apaixonar cada vez mais pela pessoa incrível que você é.

Eu amo o seu jeito, a sua aparência, a sua voz, os seus olhos, o seu sorriso, o seu cabelo... Eu amo você por completo.

E quero me apaixonar cada vez mais por você. Não vejo a hora de te encontrar, poder te abraçar, te beijar, dormir ao seu lado, construir uma família, ter nossos filhos, conquistar as nossas coisas e viver tudo isso com você. É isso que eu peço a Deus todos os dias.

Eu sei que, às vezes, posso te deixar triste ou magoada por alguma coisa. Mas quero que você sempre me conte tudo o que estiver sentindo. Quero aprender, a cada dia, a te amar melhor.

Também quero te conhecer cada vez mais. Quero ouvir as suas histórias, saber das coisas que você gosta, dos seus hobbies, das suas comidas favoritas, dos seus sonhos. Quero fazer mais ligações, tirar mais fotos com você e poder ver o seu sorriso sempre que possível.

Eu amo quando você se preocupa comigo, quando demonstra carinho, cuidado e interesse. Amo conversar com você. Espero que a gente continue criando um vínculo cada vez mais forte.

Cada segundo que passo com você me faz sentir algo diferente. É uma sensação tão boa que espero nunca perder.

Espero nunca te perder.

Eu amo ouvir as suas gracinhas, amo poder te ajudar, jogar com você e até te irritar de vez em quando kkk.

Espero que você nunca me deixe. Eu nem consigo imaginar como seria um dia sem você. Você virou parte da minha rotina. Eu penso em você toda hora, literalmente a cada segundo.

Quero fazer muito mais por você. Como eu disse, ainda estamos apenas no começo. Ainda teremos muitas risadas, muitas lembranças, muitos momentos especiais e muitas conquistas pela frente.

E quero que você saiba de uma coisa: eu te amo muito, muito mesmo.

Jamais pense que eu poderia te trocar por outra pessoa ou encontrar alguém melhor do que você. Isso simplesmente não existe.

Eu te amo com todas as minhas forças. Pode ter certeza de que a única mulher que terá o meu coração é você. Ninguém mais. Somente você.

E, acima de tudo, agradeço a Deus. Porque, sem Ele, nós nunca teríamos nos conhecido.

Eu te amo hoje, amanhã e em todos os dias da minha vida. ❤️
`;

        const texto =
            document.getElementById("texto");

        const cursor =
            document.getElementById("cursor");

        const final =
            document.getElementById("final");

        let letraAtual = 0;

        /*
            Quanto maior o número,
            mais devagar a carta escreve.

            45 = velocidade calma.
            55 = ainda mais lenta.
        */
        const velocidade = 45;

        function escreverCarta() {

            if (letraAtual < carta.length) {

                texto.textContent +=
                    carta.charAt(letraAtual);

                letraAtual++;

                /*
                    Faz a página acompanhar
                    suavemente o texto.
                */
                if (letraAtual % 45 === 0) {

                    window.scrollTo({
                        top:
                            document.body.scrollHeight,
                        behavior: "smooth"
                    });

                }

                setTimeout(
                    escreverCarta,
                    velocidade
                );

            } else {

                cursor.style.display = "none";

                final.style.display = "block";

                setTimeout(() => {

                    window.scrollTo({
                        top:
                            document.body.scrollHeight,
                        behavior: "smooth"
                    });

                }, 400);

            }
        }

        escreverCarta();

        /*
            Cria estrelas piscando.
        */
        const estrelasContainer =
            document.getElementById("estrelas");

        for (let i = 0; i < 150; i++) {

            const estrela =
                document.createElement("div");

            estrela.classList.add("estrela");

            estrela.style.left =
                Math.random() * 100 + "%";

            estrela.style.top =
                Math.random() * 100 + "%";

            const tamanho =
                Math.random() * 3 + 1;

            estrela.style.width =
                tamanho + "px";

            estrela.style.height =
                tamanho + "px";

            estrela.style.animationDelay =
                Math.random() * 4 + "s";

            estrela.style.animationDuration =
                Math.random() * 3 + 1.5 + "s";

            estrelasContainer.appendChild(
                estrela
            );
        }

        /*
            Cria corações subindo.
        */
        for (let i = 0; i < 12; i++) {

            const coracao =
                document.createElement("div");

            coracao.classList.add("coracao");

            coracao.innerText = "❤";

            coracao.style.left =
                Math.random() * 100 + "%";

            coracao.style.animationDelay =
                Math.random() * 11 + "s";

            coracao.style.animationDuration =
                Math.random() * 6 + 9 + "s";

            coracao.style.fontSize =
                Math.random() * 15 + 13 + "px";

            document.body.appendChild(
                coracao
            );
        }

        /*
            Depois vamos criar galeria.html.
        */
        function proximaParte() {

            alert(
                "A próxima surpresa será a galeria de vocês ❤️"
            );

        }
    </script>

</body>

</html>
