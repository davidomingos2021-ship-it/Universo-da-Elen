<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Universo da Elen ❤️</title>

    <style>

        body{
            margin:0;
            background:#000;
            color:white;
            font-family:Arial, Helvetica, sans-serif;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;

            overflow:hidden;
        }

        .conteudo{

            text-align:center;

            z-index:2;

        }

        h1{

            font-size:60px;

            margin-bottom:15px;

        }

        p{

            font-size:22px;

            color:#d7d7d7;

        }

        button{

            margin-top:35px;

            padding:18px 45px;

            border:none;

            border-radius:50px;

            font-size:22px;

            cursor:pointer;

            background:white;

            transition:0.4s;

        }

        button:hover{

            transform:scale(1.08);

        }

    </style>

</head>

<body>

<div class="conteudo">

<h1>❤️ Elen ❤️</h1>

<p>
Existe algo que meu coração queria te mostrar...
</p>

<button>

Entrar no nosso universo ✨

</button>

</div>

</body>

</html>
